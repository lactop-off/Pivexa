server {
    listen 80;
    server_name _;
    client_max_body_size 60m;  # アップロード上限(50MB)に余裕を持たせる

    # Docker 内蔵 DNS。上流ホスト名をリクエスト毎に再解決するために使う。
    # これが無いと nginx は起動時に一度だけ名前解決してIPを固定するため、
    # api/frontend コンテナを再作成(IP変化)すると 502 になり、nginx 再起動が必要になる。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API
    location /api/ {
        # 変数経由の proxy_pass にすることで resolver による動的解決が有効になる。
        # 変数を使うと URI 自動引き継ぎが効かないため、rewrite で /api/ を剥がす。
        set $api_upstream api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # フロントエンド（Next.js）
    location / {
        set $frontend_upstream frontend:3000;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
