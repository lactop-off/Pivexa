# 統計解析ツール（Pivexa）オンプレ単独版（基本設計書 1章）
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # api/frontend が起動済みでないと upstream を解決できずクラッシュするため待つ
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    depends_on:
      api:
        condition: service_started

  api:
    build: ./api
    # 起動時に Alembic でスキーマを最新化してから API を起動
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pivexa:pivexa@db:5432/pivexa
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/data/uploads
      - REPORTS_DIR=/data/reports
    volumes:
      - uploads:/data/uploads
      - reports:/data/reports
    # DB/Redis が接続を受け付けられる状態になるまで待ってから起動する
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # nginx が upstream として待てるよう /health で死活監視する
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  worker:
    build: ./api
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pivexa:pivexa@db:5432/pivexa
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/data/uploads
      - REPORTS_DIR=/data/reports
    volumes:
      - uploads:/data/uploads
      - reports:/data/reports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=pivexa
      - POSTGRES_PASSWORD=pivexa
      - POSTGRES_DB=pivexa
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivexa -d pivexa"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  db-data:
  uploads:
  reports:
